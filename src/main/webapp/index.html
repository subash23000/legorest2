<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <meta http-equiv="content-type" content="application/xhtml+xml; charset=UTF-8" />
    <title>Hello App Engine</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 20px;
			padding: 30px;
			background: #f3f6fa;
		}
		#legobox{
			width:550px;
			background:white;
			padding:25px;
			border-radius:12px;
			box-shadow:0px 4px 18px rgba(0,0,0,0.15);
		}
		h1{
			color:#1f4e79;
		}
		h3{
			color:#333;
			border-bottom:2px solid #1f4e79;
			padding-bottom:5px;
		}
		input[type="button"]{
			background:#1f4e79;
			color:white;
			border:none;
			padding:8px 12px;
			margin:4px 2px;
			border-radius:6px;
			cursor:pointer;
		}
		input[type="button"]:hover{
			background:#2f75b5;
		}
		a{
			display:block;
			margin-top:6px;
			color:#1f4e79;
			font-weight:bold;
			text-decoration:none;
		}
		a:hover{
			text-decoration:underline;
		}
		#settings{
			margin-top:15px;
			font-weight:bold;
			color:#222;
		}
		#currentsettings{
			margin-top:10px;
			background:#eef2f5;
			padding:10px;
			border-radius:6px;
			font-family:monospace;
		}
		iframe{
			margin-top:12px;
			border:1px solid #999;
			border-radius:6px;
			background:white;
		}
	</style>
    
  </head>

  <body>
  <script>
  var lego=new Object();
  lego.id=1;
  lego.run=1;
  lego.speed=0;
  lego.turn=0;
  lego.aika=0;
  function sendData(form){
		// lego.speed=form.speed.value;
		var json=JSON.stringify(lego);
		var xhttp = new XMLHttpRequest();
		document.getElementById("setvalues").innerHTML=json;
		xhttp.onreadystatechange = function() {
		  if (this.readyState == 4 && this.status == 200) {
		   var settings=JSON.parse(this.responseText);
		   document.getElementById("settings").innerHTML="ID="+settings.id+" Run="+settings.run+" Speed="+settings.speed+" Turn="+settings.turn;
		  }
		};
		
		xhttp.open("POST","/rest/lego/setvalues",true);
		xhttp.setRequestHeader("Content-type","application/json");
		xhttp.send(json);
	}
  function turnLeft(form){
	  lego.turn=lego.turn-10;
	  sendData(form);
  }
  function turnRight(form){
	  lego.turn=lego.turn+10;
	  sendData(form);
  }
  function stoplego(form){
	  lego.run=0;
	  sendData(form);
  }
  function startlego(form){
	  lego.run=1;
	  sendData(form);
  }
  function goFaster(form){
	  lego.speed=lego.speed+10;
	  sendData(form);
  }
  function goSlower(form){
	  lego.speed=lego.speed-10;
	  sendData(form);
  }
  </script>
    <h1>Lego Settings!</h1>
	<h3>Lego</h3>
	<p id='lego'>
	</p>
	<h3>New values</h3>
	<form id='legoform'>
	<!-- Speed: <input type='text' name='speed' value=''><br> -->
	<input type='button' name='slower' value='Slower' onclick='goSlower(this.form);'>
	<input type='button' name='faster' value='faster' onclick='goFaster(this.form);'>
	<input type='button' name='left' value='Left' onclick='turnLeft(this.form);'>
	<input type='button' name='right' value='Right' onclick='turnRight(this.form);'>
	<input type='button' name='stop' value='STOP' onclick='stoplego(this.form);'>
	<input type='button' name='start' value='START' onclick='startlego(this.form);'>
	<p id="currentsettings"></p>

	<p id='settings'>
	</p>
	<p id="setvalues">...end...</p>
	<!-- <input type='button' name='ok' value='OK' onclick='sendData(this.form);'> -->
	</form>
	<div>
		<h3>Statistics</h3>

		<a href="/rest/lego/count" target="statsFrame">Total records</a><br>
		<a href="/rest/lego/averagespeed" target="statsFrame">Average speed</a><br>
		<a href="/rest/lego/maxspeed" target="statsFrame">Maximum speed</a><br>
		<a href="/rest/lego/minspeed" target="statsFrame">Minimum speed</a><br>

		<iframe name="statsFrame" style="border:1px solid black; width:300px; height:80px;"></iframe>
	</div>
	


  </body>
</html>
